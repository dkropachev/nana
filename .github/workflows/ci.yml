name: CI

on:
  push:
    branches: [main, dev, experimental/dev]
  pull_request:
    branches: [main, dev, experimental/dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check gofmt
        run: |
          if [ -n "$(gofmt -l $(find cmd internal -type f -name '*.go'))" ]; then
            echo "::error::gofmt reported unformatted files"
            gofmt -l $(find cmd internal -type f -name '*.go')
            exit 1
          fi

  vet:
    name: Go Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...

  test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

  build:
    name: Build Native Binaries
    runs-on: ubuntu-latest
    needs: [fmt, vet, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go run ./cmd/nana-build build-go-cli

  ci-status:
    name: CI Status
    if: always()
    runs-on: ubuntu-latest
    needs: [fmt, vet, test, build]
    steps:
      - name: Check required job results
        run: |
          if [[ "${{ needs.fmt.result }}" != "success" ]] ||
             [[ "${{ needs.vet.result }}" != "success" ]] ||
             [[ "${{ needs.test.result }}" != "success" ]] ||
             [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "::error::One or more required CI jobs failed"
            echo "  fmt: ${{ needs.fmt.result }}"
            echo "  vet: ${{ needs.vet.result }}"
            echo "  test: ${{ needs.test.result }}"
            echo "  build: ${{ needs.build.result }}"
            exit 1
          fi
          echo "All required CI checks passed"
