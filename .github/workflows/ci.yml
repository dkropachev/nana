name: CI

on:
  push:
    branches: [main, dev, experimental/dev]
  pull_request:
    branches: [main, dev, experimental/dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rustfmt:
    name: Rust Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check Rust formatting
        run: cargo fmt --all --check

  clippy:
    name: Rust Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Typecheck (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run check:no-unused

  go-smoke:
    name: Go Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run Go test suite
        run: go test ./...

  test:
    name: Test (Node ${{ matrix.node-version }} / ${{ matrix.lane }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - node-version: 20
            lane: full
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Run full suite
        run: npm test

  coverage-ts-full:
    name: Coverage Report (TypeScript Full)
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run full TypeScript coverage report
        run: npm run coverage:ts:full
      - name: Add TypeScript coverage summary to job summary
        run: |
          node -e '
            const fs = require("node:fs");
            const summary = JSON.parse(fs.readFileSync("coverage/ts-full/coverage-summary.json", "utf8"));
            const total = summary.total;
            const lines = [
              "## Full TypeScript Coverage Summary",
              "",
              "| Metric | Pct | Covered / Total |",
              "|---|---:|---:|",
              `| Lines | ${total.lines.pct}% | ${total.lines.covered} / ${total.lines.total} |`,
              `| Functions | ${total.functions.pct}% | ${total.functions.covered} / ${total.functions.total} |`,
              `| Branches | ${total.branches.pct}% | ${total.branches.covered} / ${total.branches.total} |`,
              `| Statements | ${total.statements.pct}% | ${total.statements.covered} / ${total.statements.total} |`
            ];
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join("\n")}\n`);
          '
      - name: Upload full TypeScript coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ts-full-coverage
          path: coverage/ts-full/

  coverage-rust:
    name: Coverage Report (Rust)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate Rust coverage reports
        shell: bash
        run: |
          mkdir -p coverage/rust

          cargo llvm-cov --workspace --summary-only | tee coverage/rust/nana-explore-summary.txt
          cargo llvm-cov --workspace --lcov --output-path coverage/rust/nana-explore.lcov

          cargo llvm-cov --manifest-path crates/nana-sparkshell/Cargo.toml --summary-only | tee coverage/rust/nana-sparkshell-summary.txt
          cargo llvm-cov --manifest-path crates/nana-sparkshell/Cargo.toml --lcov --output-path coverage/rust/nana-sparkshell.lcov
      - name: Add Rust coverage summary to job summary
        shell: bash
        run: |
          {
            echo '## Rust Coverage Summary'
            echo ''
            echo '### nana-explore'
            echo '```text'
            cat coverage/rust/nana-explore-summary.txt
            echo '```'
            echo ''
            echo '### nana-sparkshell'
            echo '```text'
            cat coverage/rust/nana-sparkshell-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Rust coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: coverage/rust/

  build:
    name: Build (Full Source Build)
    runs-on: ubuntu-latest
    needs: [rustfmt, clippy, lint, typecheck, go-smoke, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run build:full

  ci-status:
    name: CI Status
    if: always()
    runs-on: ubuntu-latest
    needs: [rustfmt, clippy, lint, typecheck, go-smoke, test, coverage-ts-full, coverage-rust, build]
    steps:
      - name: Check required job results
        run: |
          if [[ "${{ needs.rustfmt.result }}" != "success" ]] ||
             [[ "${{ needs.clippy.result }}" != "success" ]] ||
             [[ "${{ needs.lint.result }}" != "success" ]] ||
             [[ "${{ needs.typecheck.result }}" != "success" ]] ||
             [[ "${{ needs.go-smoke.result }}" != "success" ]] ||
             [[ "${{ needs.test.result }}" != "success" ]] ||
             [[ "${{ needs.coverage-ts-full.result }}" != "success" ]] ||
             [[ "${{ needs.coverage-rust.result }}" != "success" ]] ||
             [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "::error::One or more required CI jobs failed"
            echo "  rustfmt: ${{ needs.rustfmt.result }}"
            echo "  clippy: ${{ needs.clippy.result }}"
            echo "  lint: ${{ needs.lint.result }}"
            echo "  typecheck: ${{ needs.typecheck.result }}"
            echo "  go-smoke: ${{ needs.go-smoke.result }}"
            echo "  test: ${{ needs.test.result }}"
            echo "  coverage-ts-full: ${{ needs.coverage-ts-full.result }}"
            echo "  coverage-rust: ${{ needs.coverage-rust.result }}"
            echo "  build: ${{ needs.build.result }}"
            exit 1
          fi
          echo "All required CI checks passed"
