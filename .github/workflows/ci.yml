name: CI

on:
  push:
    branches: [main, dev, experimental/dev]
  pull_request:
    branches: [main, dev, experimental/dev]
  schedule:
    # Daily non-blocking benchmark snapshot on the default branch.
    - cron: '0 9 * * *'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format Check
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check gofmt
        run: |
          if [ -n "$(gofmt -l $(find cmd internal -type f -name '*.go'))" ]; then
            echo "::error::gofmt reported unformatted files"
            gofmt -l $(find cmd internal -type f -name '*.go')
            exit 1
          fi

  vet:
    name: Go Vet
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...

  test:
    name: Go Test
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...

  benchmarks:
    name: Go Benchmarks
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run Go benchmarks
        shell: bash
        run: |
          mkdir -p bench-results
          set -o pipefail
          make benchmark | tee bench-results/go-benchmarks.txt
      - name: Publish benchmark summary
        if: always()
        run: |
          {
            echo "## Go benchmark results"
            echo
            echo "Command: \`make benchmark\`"
            echo
            if [ -s bench-results/go-benchmarks.txt ]; then
              echo "<details><summary>benchmem output</summary>"
              echo
              echo '```text'
              cat bench-results/go-benchmarks.txt
              echo '```'
              echo
              echo "</details>"
            else
              echo "No benchmark output was captured."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload benchmark output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-benchmarks-${{ github.run_id }}-${{ github.run_attempt }}
          path: bench-results/go-benchmarks.txt
          if-no-files-found: warn

  docs:
    name: Markdown Docs
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./internal/docscheck

  build:
    name: Build Native Binaries
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    needs: [fmt, vet, test, docs]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go run ./cmd/nana-build build-go-cli

  live-github-smoke:
    name: Live GitHub Smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [fmt, vet, test, docs, build]
    env:
      NANA_LIVE_GITHUB: "1"
      GH_TOKEN: ${{ secrets.NANA_LIVE_GH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run live GitHub smoke tests
        shell: bash
        run: |
          mkdir -p test-results
          set -o pipefail
          go test ./internal/gocli -run 'TestLiveGithubWorkRepoModeDirect|TestLiveGithubStartAutomationRouting|TestLiveGithubStartAutomationIdempotence|TestLiveGithubFailureCleanup' -count=1 -v | tee test-results/live-github-smoke.log
      - name: Upload live GitHub smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-github-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: test-results/live-github-smoke.log
          if-no-files-found: warn

  ci-status:
    name: CI Status
    if: always() && github.event_name != 'schedule'
    runs-on: ubuntu-latest
    needs: [fmt, vet, test, docs, build, live-github-smoke]
    steps:
      - name: Check required job results
        run: |
          if [[ "${{ needs.fmt.result }}" != "success" ]] ||
             [[ "${{ needs.vet.result }}" != "success" ]] ||
             [[ "${{ needs.test.result }}" != "success" ]] ||
             [[ "${{ needs.docs.result }}" != "success" ]] ||
             [[ "${{ needs.build.result }}" != "success" ]] ||
             [[ "${{ needs.live-github-smoke.result }}" != "success" && "${{ needs.live-github-smoke.result }}" != "skipped" ]]; then
            echo "::error::One or more required CI jobs failed"
            echo "  fmt: ${{ needs.fmt.result }}"
            echo "  vet: ${{ needs.vet.result }}"
            echo "  test: ${{ needs.test.result }}"
            echo "  docs: ${{ needs.docs.result }}"
            echo "  build: ${{ needs.build.result }}"
            echo "  live-github-smoke: ${{ needs.live-github-smoke.result }}"
            exit 1
          fi
          echo "All required CI checks passed"
