name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-version-sync:
    name: Verify Version Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify version sync against package tag
        run: go run ./cmd/nana-release-helper check-version-sync --tag "${GITHUB_REF_NAME}"

  build-native:
    name: Build native (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: [verify-version-sync]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build Go CLI release asset for target
        shell: bash
        run: |
          mkdir -p go-release-assets
          go run ./cmd/nana-build build-go-release-asset --target "${{ matrix.target }}" --out-dir go-release-assets
      - name: Upload target release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: |
            go-release-assets/*
          if-no-files-found: error

  publish-native-assets:
    name: Publish Native Assets
    runs-on: ubuntu-latest
    needs: [build-native]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          path: release-artifacts
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Generate release manifest from Go asset metadata
        shell: bash
        run: |
          mkdir -p release-assets
          find release-artifacts -type f \( -name '*.tar.xz' -o -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) -exec cp {} release-assets/ \;
          go run ./cmd/nana-release-helper generate-native-release-manifest \
            --artifacts-dir release-assets \
            --out release-assets/native-release-manifest.json \
            --release-base-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}" \
            --require-products "nana"
      - name: Upload release asset bundle for follow-up jobs
        uses: actions/upload-artifact@v4
        with:
          name: native-release-assets
          path: release-assets/*
          if-no-files-found: error
      - name: Attach native assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: RELEASE_BODY.md
          files: release-assets/*
          fail_on_unmatched_files: true
      - name: Write release summary
        shell: bash
        run: |
          {
            echo '## Native Release Assets'
            echo ''
            echo 'Published release assets:'
            ls -1 release-assets | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"

  smoke-verify-native:
    name: Smoke Verify Native Assets
    runs-on: ubuntu-latest
    needs: [publish-native-assets]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          name: native-release-assets
          path: release-assets
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify release archives and manifest
        run: go run ./cmd/nana-release-helper verify-native-release-assets --manifest release-assets/native-release-manifest.json --artifacts-dir release-assets
